name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web frontend
        run: pnpm build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-quest-web
          path: packages/web/dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Electron dependencies
        run: npm --prefix packages/electron install
        env:
          npm_config_build_from_source: true

      - name: Build web frontend
        run: pnpm build

      - name: Build and publish Electron release
        working-directory: packages/electron
        run: node build.mjs && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: Get-ChildItem dist-electron/ -Recurse -Name

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-quest-installer
          path: dist-electron/*.exe
          if-no-files-found: warn
          retention-days: 7
