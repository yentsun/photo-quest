name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install

      - name: Install Electron build tools
        working-directory: packages/electron
        run: npm install

      - name: Build web frontend
        run: pnpm build

      - name: Generate icon
        run: |
          New-Item -ItemType Directory -Force packages/electron/assets
          magick convert packages/web/public/logo512.png -define icon:auto-resize=256,128,64,48,32,16 packages/electron/assets/icon.ico

      - name: Package Electron app
        if: "!startsWith(github.ref, 'refs/tags/')"
        working-directory: packages/electron
        run: npx electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and publish Electron app
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/electron
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: photo-quest-installer
          path: dist-electron/*.exe
          retention-days: 7
